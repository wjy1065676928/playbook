---
title: configure-kernel
description: configure-kernel
privilege: TrustedInstaller
actions:

  # === Enable TSX
  # ------> By default it's disabled due to security reasons; Enabling it makes 4~5 times faster in database transaction and around 40% faster in specific workloads
  # https://github.com/meetrevision/playbook/issues/100
  - !run:
    path: "%ProgramFiles%\\Revision Tool"
    exe: "revitool.exe"
    args: "tweaks performance intel-tsx enable"
    wait: true
    runas: currentUserElevated